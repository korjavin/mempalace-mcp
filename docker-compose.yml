services:

  # ── MCP Bridge ─────────────────────────────────────────────────────────────
  mcp:
    image: ghcr.io/korjavin/mempalace-mcp:latest
    command: python mcp_bridge.py
    restart: unless-stopped
    networks:
      - traefik_network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK_NAME:-traefik_default}"
      - "traefik.http.routers.mempalace-mcp.rule=Host(`${HOSTNAME}`)"
      - "traefik.http.routers.mempalace-mcp.entrypoints=websecure"
      - "traefik.http.routers.mempalace-mcp.tls.certresolver=myresolver"
      - "traefik.http.routers.mempalace-mcp.priority=100"
      - "traefik.http.services.mempalace-mcp.loadbalancer.server.port=7891"
    volumes:
      - /opt/mempalace:/palace
    environment:
      PALACE_PATH:    /palace/data
      DB_PATH:        /palace/tokens.db
      MCP_PORT:       "7891"
      ADMIN_USER:     "${ADMIN_USER:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-changeme}"
      PUBLIC_URL:     "${PUBLIC_URL:-}"
    healthcheck:
      test:  ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7891/health')"]
      interval: 30s
      timeout:  5s
      retries:  3

  # ── Admin Portal ────────────────────────────────────────────────────────────
  admin:
    image: ghcr.io/korjavin/mempalace-mcp:latest
    command: python admin_server.py
    restart: unless-stopped
    networks:
      - traefik_network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK_NAME:-traefik_default}"
      - "traefik.http.routers.mempalace-admin.rule=Host(`${HOSTNAME}`) && (Path(`/`) || PathPrefix(`/api/tokens`))"
      - "traefik.http.routers.mempalace-admin.entrypoints=websecure"
      - "traefik.http.routers.mempalace-admin.tls.certresolver=myresolver"
      - "traefik.http.routers.mempalace-admin.priority=200"
      - "traefik.http.services.mempalace-admin.loadbalancer.server.port=7892"
    volumes:
      - /opt/mempalace:/palace
    environment:
      DB_PATH:        /palace/tokens.db
      ADMIN_PORT:     "7892"
      ADMIN_USER:     "${ADMIN_USER:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-changeme}"
    depends_on:
      - mcp

networks:
  traefik_network:
    external: true
    name: ${TRAEFIK_NETWORK_NAME:-traefik_default}
